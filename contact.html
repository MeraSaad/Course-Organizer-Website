<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اتصل بنا - منظم الكورسات</title>
    <link rel="stylesheet" href="style.css"> <!-- ربط ملف CSS الخارجي الموحد -->
</head>
<body>

    <!-- الهيكل الدلالي المطلوب -->
    <header>
        <h1>تواصل معنا</h1>
    </header>

    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="courses.html">كورساتي</a>
        <a href="add-course.html">إضافة كورس</a>
        <a href="contact.html">اتصل بنا</a>
    </nav>

    <main>
        <section>
            <h2>يسعدنا استقبال استفساراتكم</h2>
            <!-- نموذج التواصل المطلوب مع الحقول المحددة -->
            <form>
                <label for="name">الاسم:</label>
                <input type="text" id="name" name="name" placeholder="أدخل اسمك الكامل" required>

                <label for="email">البريد الإلكتروني:</label>
                <input type="email" id="email" name="email" placeholder="example@mail.com" required>

                <label for="note">ملحوظة:</label>
                <textarea id="note" name="note" rows="5" placeholder="اكتب ملحوظاتك هنا..."></textarea>

                <button type="submit">إرسال البيانات</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 جميع الحقوق محفوظة | مشروع تكنولوجيا الإنترنت</p>
    </footer>
