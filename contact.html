<!DOCTYPE html>
<html lang="en"> <!-- Language set to English for translation purposes -->
<head>
    <meta charset="UTF-8"> <!-- Supports all characters -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Course Organizer</title>
    <link rel="stylesheet" href="style.css"> <!-- Linked to External CSS -->
</head>
<body>

    <header>
        <h1>Get in Touch</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="courses.html">My Courses</a>
        <a href="add-course.html">Add Course</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <main>
        <section>
            <h2>Contact Form</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email Address:</label>
                <!-- Email field is now completely empty without a placeholder -->
                <input type="email" id="email" name="email" required> 

                <label for="note">Note:</label>
                <textarea id="note" name="note" rows="5"></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>

    </footer>

</body>
</html>
