<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Entry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Course Registration</h1></header>
    <nav>
        <a href="index.html">Home</a>
        <a href="courses.html">My Courses</a>
        <a href="add-course.html">Add Course</a>
        <a href="contact.html">Contact Us</a>
    </nav>
    <main>
        <section>
            <h2>Enter New Course Details</h2>
            <form>
                <label>Course Name:</label>
                <input type="text" placeholder="e.g. Calculus" required>
                <label>Instructor:</label>
                <input type="text" placeholder="Full Name" required>
                <label>Credit Hours:</label>
                <input type="number" required>
                <label>Day:</label>
                <input type="text" placeholder="e.g. Sunday">
                <label>Notes:</label>
                <textarea rows="4" placeholder="Additional details..."></textarea>
                <button type="submit">Submit Course</button>
            </form>
        </section>
    </main>
    <footer><p>&copy; 2026 Internet Technology Task</p></footer>
</body>
</html>
