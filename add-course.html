<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إضافة كورس جديد - منظم الكورسات</title>
    <link rel="stylesheet" href="style.css"> <!-- ربط ملف CSS الخارجي المطلوب -->
</head>
<body>

    <!-- الهيكل الدلالي Semantic Layout -->
    <header>
        <h1>إضافة كورس جديد للمنظم</h1>
    </header>

    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="courses.html">كورساتي</a>
        <a href="add-course.html">إضافة كورس</a>
        <a href="contact.html">اتصل بنا</a>
    </nav>

    <main>
        <section>
            <h2>أدخل بيانات الدورة التدريبية</h2>
            <!-- النموذج المطلوب بجميع الحقول -->
            <form>
                <label for="course-name">اسم الدورة:</label>
                <input type="text" id="course-name" name="course-name" required>

                <label for="instructor">المدرب:</label>
                <input type="text" id="instructor" name="instructor" required>

                <label for="credit-hours">الساعات المعتمدة:</label>
                <input type="number" id="credit-hours" name="credit-hours" required>

                <label for="day">اليوم:</label>
                <input type="text" id="day" name="day" placeholder="مثلاً: الأحد">

                <!-- حقل الملاحظات مطلوب في التكليف لضمان الدرجة -->
                <label for="notes">ملاحظات (Notes):</label>
                <textarea id="notes" name="notes" rows="4"></textarea>

                <button type="submit">حفظ الدورة</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 جميع الحقوق محفوظة | مشروع تكنولوجيا الإنترنت</p>
    </footer>

</body>
</html>
