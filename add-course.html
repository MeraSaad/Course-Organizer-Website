<!DOCTYPE html>
<html lang="en"> <!-- Language set to English for translation purposes -->
<head>
    <meta charset="UTF-8"> <!-- Character encoding for global compatibility -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course - Personal Organizer</title>
    <link rel="stylesheet" href="style.css"> <!-- Link to the external CSS file [2] -->
</head>
<body>

    <!-- Semantic Layout: Header [1] -->
    <header>
        <h1>Add New Course</h1>
    </header>

    <!-- Semantic Layout: Navigation Menu [1] -->
    <nav>
        <a href="index.html">Home</a>
        <a href="courses.html">My Courses</a>
        <a href="add-course.html">Add Course</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <!-- Semantic Layout: Main Content [1] -->
    <main>
        <section>
            <h2>Course Registration Form</h2>
            <!-- Complete Form with required fields [1] -->
            <form>
                <label for="course-name">Course Name:</label>
                <input type="text" id="course-name" name="course-name" required>

                <label for="instructor">Instructor:</label>
                <input type="text" id="instructor" name="instructor" required>

                <label for="credit-hours">Credit Hours:</label>
                <input type="number" id="credit-hours" name="credit-hours" required>

                <label for="day">Day:</label>
                <input type="text" id="day" name="day">

                <label for="notes">Notes:</label>
                <textarea id="notes" name="notes" rows="4"></textarea>

                <button type="submit">Add Course</button>
            </form>
        </section>
    </main>

    <!-- Semantic Layout: Footer [1] -->
    <footer>
        <p>&copy; 2026 Student Individual Task - Internet Technology</p>
    </footer>

</body>
</html>
