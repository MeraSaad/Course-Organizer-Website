<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Course</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Add to My Organizer</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="courses.html">My Courses</a>
        <a href="add-course.html">Add Course</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <main>
        <section>
            <h2>Register New Course</h2>
            <form>
                <!-- Required Fields from Task [2] -->
                <label>Course Name:</label>
                <input type="text" placeholder="e.g. Data Structures" required>

                <label>Instructor:</label>
                <input type="text" placeholder="e.g. Dr. John Doe" required>

                <label>Credit Hours:</label>
                <input type="number" min="1" max="5" required>

                <label>Notes:</label>
                <textarea rows="4" placeholder="Any special notes about the course..."></textarea>

                <button type="submit">Submit Course Data</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Student Work Portfolio</p>
    </footer>
</body>
</html>
