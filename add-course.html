<form>
    <label for="course-name">Course Name:</label>
    <input type="text" id="course-name" name="course-name" placeholder="Enter course name">

    <label for="instructor">Instructor:</label>
    <input type="text" id="instructor" name="instructor" placeholder="Enter instructor name">

    <label for="credit-hours">Credit Hours:</label>
    <input type="number" id="credit-hours" name="credit-hours">

    <label for="notes">Notes:</label>
    <textarea id="notes" name="notes" placeholder="Write any notes here..."></textarea>

    <button type="submit">Add Course</button>
</form>
