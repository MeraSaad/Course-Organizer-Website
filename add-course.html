<form>
    <label for="courseName">Course Name:</label>
    <input type="text" id="courseName" name="courseName" placeholder="e.g. Calculus">

    <label for="instructor">Instructor:</label>
    <input type="text" id="instructor" name="instructor" placeholder="Full Name">

    <label for="creditHours">Credit Hours:</label>
    <input type="number" id="creditHours" name="creditHours">

    <label for="day">Day:</label>
    <input type="text" id="day" name="day" placeholder="e.g. Sunday">

    <button type="submit">Add Course</button>
</form>
